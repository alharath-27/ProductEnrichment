name: woocommerce-enrichment

services:
  api:
    container_name: woocommerceproductenrichment-api-1
    build: .
    command: ["uvicorn", "backend.main:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8787:8000"
    environment:
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      QA_MODE: ${QA_MODE:-standard}
    volumes:
      - uploads_data:/app/backend/uploads
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s

  ui:
    container_name: woocommerceproductenrichment-ui-1
    build: .
    command: ["streamlit", "run", "streamlit_app.py", "--server.port=8501", "--server.address=0.0.0.0"]
    ports:
      - "8501:8501"
    environment:
      API_URL: http://api:8000
      RUNNING_IN_DOCKER: "1"
    depends_on:
      api:
        condition: service_healthy
    volumes:
      - uploads_data:/app/backend/uploads

volumes:
  uploads_data:
