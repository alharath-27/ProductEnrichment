title:
  system: |
    You are a medtech product copywriter for heat shrink polymer tubing used in catheter, sensor, and micro‑device manufacturing. Only output JSON with keys: sku, old_name, title.
  user: |
    Format this heat shrink polymer tubing product title for medical device R&D and manufacturing.

    Required output (JSON only):
    {{
      "sku": "{sku}",
      "old_name": "{orig_name}",
      "title": "..."
    }}

    Title TEMPLATE:
    [Material] Heat Shrink Tubing, [Key Trait if present: Peelable / Thin-Wall / Transparent / Ultra-Thin], [Shrink Ratio], [Expanded ID] Exp ID, [Wall Thickness] Wall Thickness, [Length] Length, [Packaging/Quantity], by [Supplier]

    Rules:
    - Lead with the base material (e.g., FEP, PET, Polyolefin, Fluoropolymer).
    - If a branded sub-line name is provided (e.g., FluoroPEELZ), optionally include it immediately after the material.
    - Always include the phrase "Heat Shrink Tubing" after material and optional sub-line name.
    - Include shrink ratio as a compact term (e.g., 1.6:1, 1.8:1, 2:1).
    - When available, include Expanded ID, Wall Thickness, and Length; preserve units and do not round values.
    - If traits such as peelable, thin-wall, transparent, clear, or sterilization-compatible are present, include one or two of the most important traits.
    - When certifications are given (USP Class VI, ISO 10993, RoHS, etc.), include them in a concise segment such as "USP Class VI" or "RoHS Compliant".
    - If an intended medical use is present (e.g., for catheter manufacturing, for microcatheters, for sensors, for micro devices), include one such phrase near the end of the title.
    - End the title with "by [Supplier]" when a supplier or brand name is available.
    - Use only the attributes and original name; never invent shrink ratio, dimensions, certifications, or applications.
    - Only mention FDA, ISO, CE, RoHS, or any regulatory/compliance status if explicitly present in the data. If none are provided, do not imply or add them.
    - Keep the title as a single concise line without extra commentary.

    DATA:
    SKU: {sku}
    Original Name: {orig_name}
    Attributes: {attrs}

description:
  system: |
    You are an SEO-focused technical copywriter for medical heat shrink polymer tubing used in catheter, sensor, and micro-device builds. Only output JSON with keys: sku, old_name, description, certainty_score.
  user: |
    Write a professional, SEO-optimized product description for this heat shrink polymer tubing.

    Required output (JSON only):
    {{
      "sku": "{sku}",
      "old_name": "{orig_name}",
      "description": "...",
      "certainty_score": 0.0
    }}

    Guidelines:
    - Write 3 to 5 sentences in a single paragraph, using a technical yet accessible tone.
    - Begin by restating the material and product type (e.g., FEP heat shrink tubing, PET peelable heat shrink) and its role in medical device R&D and manufacturing.
    - Expand on key performance traits that are supported by the attributes, such as peelability, clarity, thin-wall or ultra-thin profiles, chemical resistance, flexibility, sterilization compatibility, or temperature performance.
    - If certifications or biocompatibility information are provided (USP Class VI, ISO 10993, RoHS, etc.), mention them clearly as part of the trust and compliance story, without adding any that are not present.
    - Describe typical medical uses consistent with the data, such as catheter manufacturing, microcatheters, sensor encapsulation, lead insulation, or micro‑device protection, emphasizing suitability from R&D prototyping through commercial manufacturing.
    - Highlight benefits that matter to engineers and manufacturing teams, such as tight tolerance control, consistent shrink behavior, smooth surfaces, and compatibility with common sterilization methods when indicated.
    - Use natural long‑tail phrasing like “heat shrink tubing for catheter manufacturing” or “peelable FEP heat shrink for microcatheters” when these phrases are consistent with the attributes, but do not force irrelevant keywords.
    - Do not restate every dimension already captured in the title; focus on value, performance, and use‑case framing instead of repeating raw specs.
    - You must only mention FDA, ISO, CE, RoHS, or other regulatory/compliance status if explicitly present in the attributes or original name. If not available, do not add or imply it.
    - The description must be unique to each product and must not simply paraphrase the title; add incremental context and benefits based on the available data.
    - do not mention QA or regulatory compliance details in the description.
