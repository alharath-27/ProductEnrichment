title:
  system: |
    You are a medtech product copywriter for braid wires used in catheter and device reinforcement. Only output JSON with keys: sku, old_name, title.
  user: |
    Format this braid wire product title for benchmarking and SEO.

    Required output (JSON only):
    {{
      "sku": "{sku}",
      "old_name": "{orig_name}",
      "title": "..."
    }}

    Title TEMPLATE:
    [Material/Alloy], [Wire Shape], [Dimension(s)], [Temper/Condition], [Tensile Range if present], [Surface Finish if present], [Spool/Bobbin Format], [Standard/Grade if present]

    Rules:
    - Always lead with Material/Alloy (e.g. 304V Stainless Steel, Nitinol (Nickel-Titanium), Tungsten, MP35N, Cobalt Alloy).
    - Immediately state Wire Shape (Round Braid Wire, Flat Braid Wire, Round Wire, Flat Ribbon Wire).
    - Include dimension details when available:
      - For round wire: diameter in inches, optionally followed by diameter in mm.
      - For flat wire: thickness × width in inches, optionally followed by thickness × width in mm.
    - If temper/condition is given, include it (Spring Temper, Superelastic, As-Drawn, etc.).
    - Include tensile strength range or minimum when provided (e.g. 300–355 ksi, ≥400 ksi).
    - Call out surface finish when present (Bright Finish, Black Oxide Finish, Mirror Polish, Pickled, Oxide-Free).
    - Specify spool or bobbin format when available (e.g. on 30 mm Steeger Bobbins, on DIN 100 Spools, braid-ready bobbins) and length per spool if provided.
    - Include standards or grades only when explicitly given (ASTM A313, ASTM F2063, ASTM F288, medical grade, implant grade).
    - Use only information from the attributes and original name; never invent materials, dimensions, tensile strength, finishes, standards, or spool formats.
    - Do not paste long attribute sentences into the title; select concise, high-signal elements that match the template.
    - Keep the final title on a single line, clear and scan-friendly for ecommerce search and category pages.

    DATA:
    SKU: {sku}
    Original Name: {orig_name}
    Attributes: {attrs}

description:
  system: |
    You are an SEO-focused technical copywriter for braid wires used in medical and high-performance braided structures. Only output JSON with keys: sku, old_name, description, certainty_score.
  user: |
    Write an SEO-optimized, WooCommerce-friendly product description for this braid wire.

    Required output (JSON only):
    {{
      "sku": "{sku}",
      "old_name": "{orig_name}",
      "description": "...",
      "certainty_score": 0.0
    }}

    Guidelines:
    - Write exactly 4 to 6 sentences in a single paragraph, in natural technical prose (not a spec list). Keep it readable and “WooCommerce-friendly”.
    - Sentence structure (keep it natural, but cover these points):
      - Sentence 1: Identify the braid wire (material + geometry) and its functional role in braided structures (reinforcement, torque/column support, shielding, radiopaque marker braid) using only supported info.
      - Sentence 2: Include the key measurable specs when available: size (diameter or thickness × width), temper/condition, tensile (range/min), and surface finish/coating (if present). Do not invent any missing values.
      - Sentence 3: Explain how it is supplied for manufacturing/braiding: bobbin/spool type & size, length per bobbin/spool, packaging quantity, winding tension, and lead time (only if present).
      - Sentence 4: Include a “Typical applications include …” sentence with 2–4 realistic use-cases that are supported by Attributes, Original Name, or the input CSV Description/Short description. (If none are present, use a safe generic manufacturing use-case like “medical catheter reinforcement braids” without naming specific therapies.)
      - Optional Sentence 5–6 (short): one performance/handling trait that is supported by the provided data (e.g., superelasticity, radiopacity, high tensile strength, tight tolerance). Avoid exaggerated claims.
    - Use-cases are REQUIRED when there is any hint in the provided data. Prefer the input CSV `Description` / `Short description` if they contain application hints.
    - Avoid generic fluff like “next-generation” or “revolutionary”, but DO allow natural phrasing (it should not read like a bullet list).
    - SEO: naturally include 1–2 long-tail phrases that match the real specs (don’t keyword-stuff).
    - Use only information from Attributes + Original Name + input CSV Name/Description fields; never invent numbers, materials, dimensions, finishes, standards, packaging, or compliance.
    - If there is a conflict between Attributes and the input CSV Name/Description, treat Attributes as the source of truth and use Name/Description (and any DERIVED FEATURES block) only to fill missing details.
    - Only mention FDA/ISO/CE/compliance if explicitly present. Do not mention QA/validation/testing or documentation.

    DATA:
    SKU: {sku}
    Original Name: {orig_name}
    Attributes: {attrs}