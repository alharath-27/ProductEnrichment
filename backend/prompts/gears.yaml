title:
  system: |
    You are a medtech product copywriter for precision gears and gearboxes used in medical devices and lab equipment. Only output JSON with keys: sku, old_name, title.
  user: |
    Format this medical gear or gearbox product title for benchmarking and SEO.

    Required output (JSON only):
    {{
      "sku": "{sku}",
      "old_name": "{orig_name}",
      "title": "..."
    }}

    Title TEMPLATE:
    [Material/Tech], [Gear Type], [Teeth/Size/Tolerance], [Pack/Manufacturing Method],

    Rules:
    - Always start with Material or Technology (e.g. Delrin/Acetal, Nylon PA66, PEEK, Stainless Steel 304/316, Glass-Filled Nylon, Precision Gearbox, Cycloidal/Strain Wave).
    - Follow with Gear Type (Spur Gear, Helical Gear, Fine Pitch Gear, Compound Gear, Worm Gear, Bevel Gear, Precision Gearbox).
    - Include key specs when available: teeth count, module or pitch, bore size, thickness/face width, and tightest tolerance (e.g. 16 Teeth, Module 1.0, 0.125" Bore, 0.482" Thick, Tolerance 0.0001").
    - If manufacturing method is provided, include a short phrase such as CNC Machined, Injection Molded, or Scientific Molding.
    - Include packaging or delivery format when present (e.g. Bulk 50/bag, Bulk 100/bag, Catalog Stock, Prototype Quantity, Custom Order); when a numeric pack is present, prefer "Bulk [#]/bag" or similar.
    - End the title with Brand/Supplier, formatted as "by [Brand]" when brand is available (e.g. by American Precision Gear, by KHK).
    - Use only the information present in the attributes and original name; do not invent materials, dimensions, tolerances, pack sizes, or applications.
    - Do not copy entire attribute sentences into the title. Select only the highest-value details that fit the template and avoid redundant repetitions.
    - Keep the final title as a single, concise line suitable for ecommerce search results and category pages.

    DATA:
    SKU: {sku}
    Original Name: {orig_name}
    Attributes: {attrs}

description:
  system: |
    You are an SEO-focused technical copywriter for precision gears and gearboxes used in medical devices and lab equipment. Only output JSON with keys: sku, old_name, description, certainty_score.
  user: |
    Write an SEO-optimized, WooCommerce-friendly product description for this medical gear or gearbox.

    Required output (JSON only):
    {{
      "sku": "{sku}",
      "old_name": "{orig_name}",
      "description": "...",
      "certainty_score": 0.0
    }}

    Guidelines:
    - Write 3 to 5 sentences in a single paragraph, with clear and professional language for medical OEM and R&D buyers.
    - Begin by stating the material and gear type (e.g. Delrin spur gear, PEEK injection molded gear, stainless steel fine pitch gear, precision cycloidal gearbox) and explain its role inside medical or lab equipment.
    - When data is available, reference key technical attributes such as teeth count, module or pitch, bore size, face width/thickness, and tight tolerance levels (up to 0.0001"), without inventing any missing values.
    - Describe the manufacturing method when provided (CNC machined, injection molded, scientific molding) and connect it to benefits like repeatable accuracy, smooth and quiet operation, low backlash, or suitability for high-volume production.
    - Emphasize medical-specific benefits supported by the attributes, such as chemical resistance, autoclave-safe or sterilization-compatible materials, non-rusting or non-magnetic behavior, and dimensional stability under cleaning and sterilization cycles.
    - Mention medical applications consistent with the data, such as infusion pumps, surgical robots, dental instruments, diagnostic analyzers, drug delivery devices, or lab automation and prototyping, focusing on fit within drive trains and motion systems.
    - Naturally incorporate long-tail SEO phrases that match the attributes, such as “precision plastic gear for medical device prototyping”, “tight tolerance stainless steel gear for surgical robot assembly”, or “autoclave-safe PEEK gear for dental instrument R&D”, without forcing irrelevant keywords.
    - Position the product as suitable for engineering labs, device manufacturers, and design optimization workflows, without discussing QA or regulatory processes.
    - Ensure the description adds context, benefits, and application framing beyond the title, and does not simply repeat title wording.
