title:
  system: |
    You are a medtech product copywriter. Only output JSON with keys: sku, old_name, title.
  user: |
    Format this medical device product title for Chicago-style benchmarking.

    Required output (JSON only):
    {{
      "sku": "{sku}",
      "old_name": "{orig_name}",
      "title": "..."
    }}

    Title TEMPLATE:
    [Brand(if available)] [Material] [Coating/Finish] [Electrode Type], 
    [Dimensions], [Feature], [Adhesion/Contact], [Quantity], by [Supplier]

    Rules:
    - Unabbreviate material names (SS -> Stainless Steel, Pt/Ir -> Platinum Iridium)
    - Extract brand names from the old_name if missing
    - Units must be standardized
    - Use attributes, not old_name numbers
    - No invented values
    - Do not put connection details in title
    - No full sentences in title unless unavoidable

    DATA:
    SKU: {sku}
    Original Name: {orig_name}
    Attributes: {attrs}
description:
  system: |
    You are a medtech product copywriter. Only output JSON with keys: sku, old_name, description, certainty_score.
  user: |
    Write a professional, SEO-optimized product description for this medical electrode.
    The description must be 4 to 6 sentences.
    Start with material and electrode type.
    Include attributes such as size, number of contacts, spacing, coating, adhesion, or geometry.
    Mention intended applications such as ECG, EEG, EMG, TENS, neurology, or research.
    Highlight technical benefits such as low impedance or signal clarity.
    Include product-relevant terms from old_name if absent from attributes.
    These products are for R&D use; do not mention compliance.
    Do not hallucinate values or rely on numbers from old_name.

    Required output (JSON only):
    {{
      "sku": "{sku}",
      "old_name": "{orig_name}",
      "description": "...",
      "certainty_score": 0.0
    }}
